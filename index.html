<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Vault Pro | Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            /* Oya dapu image ekata samana lassan gradient background ekak */
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.2) 0px, transparent 50%),
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            color: #f8fafc;
        }

        /* Glassmorphism Effect */
        .glass-box {
            background: rgba(15, 23, 42, 0.5); /* Dark transparent */
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 18px !important;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: rgba(99, 102, 241, 0.5) !important;
            background: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .btn-save {
            background: white;
            color: #0f172a;
            font-weight: 800;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-radius: 18px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            filter: brightness(0.9);
        }

        .nav-pill {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
        }

        .active-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="toast" class="fixed top-10 right-10 glass-box px-6 py-3 text-white font-bold hidden animate__animated z-50"></div>

    <header class="text-center mb-10 animate__animated animate__fadeInDown">
        <h1 class="text-5xl font-black tracking-tight mb-2">LP Vault Pro</h1>
        <p class="text-white/60 font-medium italic">Master Your CPA Destinations</p>
    </header>

    <main class="w-full max-w-lg animate__animated animate__zoomIn">
        
        <section id="addPage" class="glass-box p-10 shadow-2xl">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-2xl">🔗</div>
                <h2 class="text-2xl font-bold">Secure Archive</h2>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-white/40 uppercase tracking-widest mb-2 ml-1">Traffic Network</label>
                    <select id="network" class="input-glass w-full p-4 outline-none font-bold text-sm">
                        </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-black text-white/40 uppercase tracking-widest mb-2 ml-1">Landing Page Title</label>
                        <input type="text" id="lpName" placeholder="E.g. Fortnite Skin Generator" class="input-glass w-full p-4 outline-none font-semibold">
                    </div>
                    
                    <div class="col-span-2">
                        <label class="block text-[10px] font-black text-white/40 uppercase tracking-widest mb-2 ml-1">Direct URL</label>
                        <input type="url" id="lpUrl" placeholder="https://..." class="input-glass w-full p-4 outline-none font-semibold">
                    </div>

                    <div class="col-span-2">
                        <label class="block text-[10px] font-black text-white/40 uppercase tracking-widest mb-2 ml-1">Status</label>
                        <select id="lpStatus" class="input-glass w-full p-4 outline-none font-bold text-sm">
                            <option value="Active">🟢 Online / Active</option>
                            <option value="Not Active">🔴 Offline / Not Active</option>
                        </select>
                    </div>
                </div>

                <button onclick="submitData()" id="submitBtn" class="btn-save w-full py-5 uppercase text-xs mt-4">Save to Cloud</button>
            </div>
        </section>

        <section id="listPage" class="hidden animate__animated animate__fadeIn">
            <div class="flex gap-3 mb-6">
                <input type="text" id="search" onkeyup="filterData()" placeholder="Search LP..." class="flex-1 input-glass p-4 outline-none">
                <select id="filterNet" onchange="filterData()" class="input-glass px-4 font-bold text-xs"></select>
            </div>
            
            <div id="loader" class="text-center py-10 hidden">
                <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
            </div>

            <div id="listGrid" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar"></div>
        </section>
    </main>

    <nav class="fixed bottom-10 nav-pill p-2 flex gap-2">
        <button onclick="showPage('add')" id="nav-add" class="active-pill px-8 py-3 rounded-[20px] font-bold text-sm flex items-center gap-2 transition">
            ✨ Add Link
        </button>
        <button onclick="showPage('list')" id="nav-list" class="px-8 py-3 rounded-[20px] font-bold text-sm flex items-center gap-2 transition opacity-50">
            🚀 My Vault
        </button>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmKUr8mcmRKuIp8XRcyV-Zy5UiNx3XXVd_XieV_cwk6Yt8QZzgllbKT40RwPFCNCxGoQ/exec';
        let networks = ["CPAGrip", "AdBlueMedia", "CPAlead", "OGAds", "AdsEmpire", "CPAZon", "Trafee", "ImonatizeIt", "VHC Network", "CPA Junckie"];

        function initNetworks() {
            const sels = [document.getElementById('network'), document.getElementById('filterNet')];
            sels.forEach((s, i) => {
                s.innerHTML = i === 1 ? '<option value="All">All Networks</option>' : '';
                networks.forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
            });
        }

        function showPage(p) {
            document.getElementById('addPage').classList.toggle('hidden', p !== 'add');
            document.getElementById('listPage').classList.toggle('hidden', p !== 'list');
            document.getElementById('nav-add').classList.toggle('active-pill', p === 'add');
            document.getElementById('nav-add').classList.toggle('opacity-50', p !== 'add');
            document.getElementById('nav-list').classList.toggle('active-pill', p === 'list');
            document.getElementById('nav-list').classList.toggle('opacity-50', p !== 'list');
            if(p === 'list') fetchData();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            t.classList.add('animate__fadeInRight');
            setTimeout(() => {
                t.classList.replace('animate__fadeInRight', 'animate__fadeOutRight');
                setTimeout(() => t.style.display = 'none', 500);
            }, 3000);
        }

        async function submitData() {
            const btn = document.getElementById('submitBtn');
            const data = { 
                network: document.getElementById('network').value, 
                name: document.getElementById('lpName').value, 
                link: document.getElementById('lpUrl').value, 
                status: document.getElementById('lpStatus').value 
            };
            if(!data.name || !data.link) return showToast("❌ Fill all fields!");
            
            btn.innerText = "SAVING..."; btn.disabled = true;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            showToast("✅ Saved to Vault!");
            document.getElementById('lpName').value = ""; document.getElementById('lpUrl').value = "";
            btn.innerText = "Save to Cloud"; btn.disabled = false;
        }

        async function fetchData() {
            const grid = document.getElementById('listGrid');
            document.getElementById('loader').classList.remove('hidden'); grid.innerHTML = "";
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            window.allData = data;
            renderCards(data);
            document.getElementById('loader').classList.add('hidden');
        }

        async function toggleStatus(link, current) {
            const newStatus = current === 'Active' ? 'Not Active' : 'Active';
            showToast("🔄 Updating...");
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStatus', link, status: newStatus }) });
            fetchData();
        }

        function renderCards(data) {
            const grid = document.getElementById('listGrid');
            grid.innerHTML = data.reverse().map(row => {
                const active = row[4] !== 'Not Active';
                return `
                <div class="glass-box p-6 flex flex-col gap-4 animate__animated animate__fadeInUp">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black uppercase text-indigo-400 tracking-widest">${row[0]}</span>
                        <button onclick="toggleStatus('${row[2]}', '${row[4]}')" class="text-[9px] font-bold px-3 py-1 rounded-full border ${active ? 'border-emerald-500 text-emerald-500' : 'border-rose-500 text-rose-500'}">
                            ${active ? 'ONLINE' : 'PAUSED'}
                        </button>
                    </div>
                    <h3 class="text-lg font-bold truncate">${row[1]}</h3>
                    <div class="flex gap-2">
                        <a href="${row[2]}" target="_blank" class="flex-1 bg-white text-black text-center py-3 rounded-xl font-bold text-[10px] uppercase">Open</a>
                        <button onclick="navigator.clipboard.writeText('${row[2]}'); showToast('📋 Copied!')" class="flex-1 bg-white/5 py-3 rounded-xl font-bold text-[10px] border border-white/10 uppercase">Copy</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filterData() {
            const q = document.getElementById('search').value.toLowerCase();
            const n = document.getElementById('filterNet').value;
            renderCards(window.allData.filter(r => r[1].toLowerCase().includes(q) && (n === "All" || r[0] === n)));
        }

        initNetworks();
    </script>
</body>
</html>
