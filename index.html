<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Vault Pro | Affiliate Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #ffffff !important;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #818cf8 !important;
        }
        .input-field option {
            background: #1e293b;
            color: white;
        }
        .copy-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 14px 28px;
            border-radius: 16px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="copyToast" class="copy-toast animate__animated">Copied to Vault! ✅</div>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 glass px-6 py-4 z-50 flex gap-6 shadow-2xl border border-white/20">
        <button onclick="showPage('add')" class="px-5 py-2 rounded-xl flex items-center gap-2 text-white font-bold hover:bg-white/10 transition group">
            <span class="group-hover:rotate-12 transition">✨</span> Add Link
        </button>
        <div class="w-[1px] bg-white/20 my-2"></div>
        <button onclick="showPage('list')" class="px-5 py-2 rounded-xl flex items-center gap-2 text-white font-bold hover:bg-white/10 transition group">
            <span class="group-hover:scale-125 transition">🚀</span> My Vault
        </button>
    </nav>

    <main class="max-w-6xl mx-auto pt-16 px-6 pb-40">
        <header class="text-center mb-12 animate__animated animate__fadeInDown">
            <h1 class="text-6xl font-extrabold gradient-text tracking-tight mb-3">LP Vault Pro</h1>
            <p class="text-white/60 font-medium text-lg italic">Master Your CPA Destinations</p>
        </header>

        <section id="addPage" class="animate__animated animate__fadeInUp">
            <div class="glass p-10 max-w-lg mx-auto shadow-2xl">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-14 h-14 bg-indigo-500/20 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-white/10">🔗</div>
                    <h2 class="text-2xl font-bold text-white">Secure Archive</h2>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-white/70 text-xs font-black uppercase tracking-widest mb-2 ml-1">Traffic Network</label>
                        <select id="network" class="input-field w-full p-4 rounded-2xl outline-none transition cursor-pointer font-semibold">
                            <option>CPAGrip</option>
                            <option>AdBlueMedia</option>
                            <option>CPAlead</option>
                            <option>OGAds</option>
                            <option>AdsEmpire</option>
                            <option>CPAZon</option>
                            <option>Trafee</option>
                            <option>ImonatizeIt</option>
                            <option>VHC Network</option>
                            <option>CPA Junckie</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-white/70 text-xs font-black uppercase tracking-widest mb-2 ml-1">Landing Page Title</label>
                        <input type="text" id="lpName" placeholder="E.g. Fortnite Skin Generator" class="input-field w-full p-4 rounded-2xl outline-none font-medium">
                    </div>
                    <div>
                        <label class="block text-white/70 text-xs font-black uppercase tracking-widest mb-2 ml-1">Direct URL</label>
                        <input type="url" id="lpUrl" placeholder="https://..." class="input-field w-full p-4 rounded-2xl outline-none font-medium">
                    </div>
                    
                    <button onclick="submitData()" id="submitBtn" class="w-full bg-white text-indigo-950 font-black py-5 rounded-2xl shadow-2xl hover:scale-[1.02] active:scale-95 transition-all mt-4 uppercase tracking-widest">
                        Save To Cloud
                    </button>
                </div>
            </div>
        </section>

        <section id="listPage" class="hidden animate__animated animate__fadeIn">
            <div class="flex flex-col md:flex-row gap-4 mb-10">
                <div class="relative flex-1">
                    <input type="text" id="search" onkeyup="filterData()" placeholder="Search by name..." class="w-full pl-6 pr-4 py-4 rounded-2xl shadow-xl outline-none glass border-none text-white placeholder-white/40 font-medium">
                </div>
                <select id="filterNet" onchange="filterData()" class="p-4 rounded-2xl shadow-xl outline-none glass border-none text-white font-bold cursor-pointer">
                    <option value="All">All Networks</option>
                    <option>CPAGrip</option>
                    <option>AdBlueMedia</option>
                    <option>CPAlead</option>
                    <option>OGAds</option>
                    <option>AdsEmpire</option>
                    <option>CPAZon</option>
                    <option>Trafee</option>
                    <option>ImonatizeIt</option>
                    <option>VHC Network</option>
                    <option>CPA Junckie</option>
                </select>
            </div>

            <div id="loader" class="text-center py-20 hidden">
                <div class="w-16 h-16 border-4 border-white/20 border-t-white rounded-full animate-spin mx-auto"></div>
                <p class="text-white/60 mt-4 font-bold tracking-widest">LOADING VAULT...</p>
            </div>

            <div id="listGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmKUr8mcmRKuIp8XRcyV-Zy5UiNx3XXVd_XieV_cwk6Yt8QZzgllbKT40RwPFCNCxGoQ/exec';

        function showPage(page) {
            document.getElementById('addPage').classList.toggle('hidden', page !== 'add');
            document.getElementById('listPage').classList.toggle('hidden', page !== 'list');
            if(page === 'list') fetchData();
        }

        function showToast(msg) {
            const toast = document.getElementById('copyToast');
            toast.innerText = msg;
            toast.style.display = 'block';
            toast.classList.add('animate__fadeInRight');
            setTimeout(() => {
                toast.classList.replace('animate__fadeInRight', 'animate__fadeOutRight');
                setTimeout(() => { toast.style.display = 'none'; toast.classList.remove('animate__fadeOutRight'); }, 500);
            }, 2500);
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url);
            showToast("Copied to Clipboard! 📋");
        }

        async function submitData() {
            const btn = document.getElementById('submitBtn');
            const data = {
                network: document.getElementById('network').value,
                name: document.getElementById('lpName').value,
                link: document.getElementById('lpUrl').value
            };
            if(!data.name || !data.link) return alert("Please fill all fields!");
            
            btn.innerText = "UPLOADING...";
            btn.disabled = true;
            
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                showToast("Archive Success! 🚀");
                document.getElementById('lpName').value = "";
                document.getElementById('lpUrl').value = "";
            } catch (e) {
                alert("Error connecting to cloud.");
            } finally {
                btn.innerText = "SAVE TO CLOUD";
                btn.disabled = false;
            }
        }

        async function fetchData() {
            const grid = document.getElementById('listGrid');
            document.getElementById('loader').classList.remove('hidden');
            grid.innerHTML = "";

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                window.allData = data;
                renderCards(data);
            } catch (e) {
                grid.innerHTML = `<p class="text-white text-center col-span-full">Cloud connection failed.</p>`;
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('listGrid');
            if(data.length === 0) {
                grid.innerHTML = `<p class="text-white/40 text-center col-span-full py-20 font-bold">No pages found in this archive.</p>`;
                return;
            }
            grid.innerHTML = data.reverse().map((row, i) => `
                <div class="glass-card p-7 rounded-[2.5rem] shadow-2xl animate__animated animate__fadeInUp" style="animation-delay: ${i*0.05}s">
                    <div class="flex justify-between items-center mb-5">
                        <span class="bg-indigo-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-200">${row[0]}</span>
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">${new Date(row[3]).toLocaleDateString()}</span>
                    </div>
                    <h3 class="text-2xl font-800 text-gray-900 mb-2 leading-tight">${row[1]}</h3>
                    <p class="text-indigo-500 text-xs mb-6 truncate font-bold bg-indigo-50 p-2 rounded-lg border border-indigo-100">${row[2]}</p>
                    <div class="flex gap-3">
                        <a href="${row[2]}" target="_blank" class="flex-1 bg-gray-900 text-white text-center py-4 rounded-2xl font-black text-xs hover:bg-indigo-700 transition-all uppercase tracking-widest shadow-xl">Open</a>
                        <button onclick="copyLink('${row[2]}')" class="flex-1 bg-indigo-100 text-indigo-700 py-4 rounded-2xl font-black text-xs hover:bg-indigo-200 transition-all uppercase tracking-widest border border-indigo-200">Copy</button>
                    </div>
                </div>
            `).join('');
        }

        function filterData() {
            const query = document.getElementById('search').value.toLowerCase();
            const net = document.getElementById('filterNet').value;
            const filtered = window.allData.filter(row => (row[1].toLowerCase().includes(query)) && (net === "All" || row[0] === net));
            renderCards(filtered);
        }
    </script>
</body>
</html>
