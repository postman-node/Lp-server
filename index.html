<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Vault Pro | Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.2) 0px, transparent 50%),
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            color: #f8fafc;
        }

        .glass-box {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(25px) saturate(170%);
            -webkit-backdrop-filter: blur(25px) saturate(170%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
        }

        /* Dropdown Fix */
        select option {
            background: #1e293b;
            color: white;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.07) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: white !important;
            border-radius: 15px !important;
            transition: all 0.3s ease;
        }

        .btn-white {
            background: white;
            color: #0f172a;
            font-weight: 800;
            border-radius: 15px;
            transition: 0.3s;
        }

        .btn-white:hover {
            transform: scale(1.02);
            filter: brightness(0.9);
        }

        .nav-pill {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
        }

        .active-pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div id="toast" class="fixed top-10 right-10 glass-box px-6 py-3 text-white font-bold hidden animate__animated z-50"></div>

    <header class="text-center mt-8 mb-10">
        <h1 class="text-4xl font-black tracking-tight mb-1">Landing Page Saver</h1>
        <p class="text-white/50 text-sm italic">Master Your CPA Destinations</p>
    </header>

    <main class="w-full max-w-xl">
        
        <section id="listPage" class="animate__animated animate__fadeIn">
            <div class="flex flex-col gap-4 mb-8">
                <div class="flex gap-2">
                    <input type="text" id="search" onkeyup="filterData()" placeholder="Search Landing Pages..." class="flex-1 input-glass p-4 outline-none text-sm">
                    <select id="filterNet" onchange="filterData()" class="input-glass px-4 font-bold text-xs outline-none"></select>
                </div>
                
                <div class="flex gap-2 p-2 glass-box rounded-2xl border-dashed border-white/20">
                    <input type="text" id="newNetName" placeholder="New Network Name..." class="flex-1 bg-transparent px-3 py-1 text-xs outline-none">
                    <button onclick="addNewNetwork()" class="bg-indigo-500/20 hover:bg-indigo-500/40 px-4 py-1 rounded-xl text-[10px] font-black uppercase">Add Network</button>
                </div>
            </div>

            <div id="loader" class="text-center py-10 hidden">
                <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
            </div>

            <div id="listGrid" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2 custom-scroll"></div>
        </section>

        <section id="addPage" class="hidden glass-box p-8 animate__animated animate__zoomIn">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">🔗</div>
                <h2 class="text-xl font-bold">Secure Archive</h2>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-white/40 uppercase mb-2 block">Traffic Network</label>
                    <select id="network" class="input-glass w-full p-4 outline-none font-bold text-sm"></select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-white/40 uppercase mb-2 block">LP Name</label>
                    <input type="text" id="lpName" placeholder="E.g. CashApp Giveaway" class="input-glass w-full p-4 outline-none font-semibold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-white/40 uppercase mb-2 block">Destination URL</label>
                    <input type="url" id="lpUrl" placeholder="https://..." class="input-glass w-full p-4 outline-none font-semibold">
                </div>
                <div>
                    <label class="text-[10px] font-black text-white/40 uppercase mb-2 block">Initial Status</label>
                    <select id="lpStatus" class="input-glass w-full p-4 outline-none font-bold text-sm">
                        <option value="Active">🟢 Online / Active</option>
                        <option value="Not Active">🔴 Offline / Not Active</option>
                    </select>
                </div>
                <button onclick="submitData()" id="submitBtn" class="btn-white w-full py-5 uppercase text-[11px] mt-4 shadow-xl">Secure to Cloud</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 nav-pill p-1.5 flex gap-1">
        <button onclick="showPage('list')" id="nav-list" class="active-pill px-8 py-3 rounded-[20px] font-bold text-xs flex items-center gap-2 transition">
            🚀 My Vault
        </button>
        <button onclick="showPage('add')" id="nav-add" class="px-8 py-3 rounded-[20px] font-bold text-xs flex items-center gap-2 transition opacity-50">
            ✨ Add LP
        </button>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmKUr8mcmRKuIp8XRcyV-Zy5UiNx3XXVd_XieV_cwk6Yt8QZzgllbKT40RwPFCNCxGoQ/exec';
        let networks = ["CPAGrip", "AdBlueMedia", "CPAlead", "OGAds", "AdsEmpire", "CPAZon", "Trafee", "ImonatizeIt", "VHC Network"];

        function initNetworks() {
            const sels = [document.getElementById('network'), document.getElementById('filterNet')];
            sels.forEach((s, i) => {
                s.innerHTML = i === 1 ? '<option value="All">All Networks</option>' : '';
                networks.forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
            });
        }

        function addNewNetwork() {
            const n = document.getElementById('newNetName').value.trim();
            if(n && !networks.includes(n)) {
                networks.push(n);
                initNetworks();
                document.getElementById('newNetName').value = '';
                showToast("✅ Network Added!");
            }
        }

        function showPage(p) {
            document.getElementById('addPage').classList.toggle('hidden', p !== 'add');
            document.getElementById('listPage').classList.toggle('hidden', p !== 'list');
            document.getElementById('nav-list').classList.toggle('active-pill', p === 'list');
            document.getElementById('nav-list').classList.toggle('opacity-50', p !== 'list');
            document.getElementById('nav-add').classList.toggle('active-pill', p === 'add');
            document.getElementById('nav-add').classList.toggle('opacity-50', p !== 'add');
            if(p === 'list') fetchData();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block'; t.classList.add('animate__fadeInRight');
            setTimeout(() => { t.classList.replace('animate__fadeInRight', 'animate__fadeOutRight'); setTimeout(() => t.style.display = 'none', 500); }, 3000);
        }

        async function submitData() {
            const btn = document.getElementById('submitBtn');
            const data = { network: document.getElementById('network').value, name: document.getElementById('lpName').value, link: document.getElementById('lpUrl').value, status: document.getElementById('lpStatus').value };
            if(!data.name || !data.link) return showToast("❌ Missing Fields!");
            btn.innerText = "UPLOADING..."; btn.disabled = true;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            showToast("✅ LP Saved!");
            document.getElementById('lpName').value = ""; document.getElementById('lpUrl').value = "";
            btn.innerText = "Secure to Cloud"; btn.disabled = false;
        }

        async function fetchData() {
            const grid = document.getElementById('listGrid');
            document.getElementById('loader').classList.remove('hidden'); grid.innerHTML = "";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                window.allData = data;
                renderCards(data);
            } catch(e) { showToast("⚠️ Error loading data"); }
            document.getElementById('loader').classList.add('hidden');
        }

        async function toggleStatus(link, current) {
            const newStatus = current === 'Active' ? 'Not Active' : 'Active';
            showToast("🔄 Updating...");
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStatus', link, status: newStatus }) });
            fetchData();
        }

        function renderCards(data) {
            const grid = document.getElementById('listGrid');
            grid.innerHTML = data.reverse().map(row => {
                const active = row[4] !== 'Not Active';
                return `
                <div class="glass-box p-5 animate__animated animate__fadeInUp">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[9px] font-black text-indigo-400 uppercase tracking-tighter">${row[0]}</span>
                        <button onclick="toggleStatus('${row[2]}', '${row[4]}')" class="text-[9px] font-bold px-3 py-1 rounded-full border ${active ? 'border-emerald-500/50 text-emerald-400 bg-emerald-500/10' : 'border-rose-500/50 text-rose-400 bg-rose-500/10'}">
                            ${active ? 'ONLINE' : 'OFFLINE'}
                        </button>
                    </div>
                    <h3 class="font-bold text-sm mb-4 truncate">${row[1]}</h3>
                    <div class="flex gap-2">
                        <a href="${row[2]}" target="_blank" class="flex-1 bg-white/10 hover:bg-white text-white hover:text-black py-2.5 rounded-xl font-bold text-[10px] text-center transition">OPEN</a>
                        <button onclick="navigator.clipboard.writeText('${row[2]}'); showToast('📋 Copied!')" class="flex-1 bg-white/5 py-2.5 rounded-xl font-bold text-[10px] border border-white/10">COPY</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filterData() {
            const q = document.getElementById('search').value.toLowerCase();
            const n = document.getElementById('filterNet').value;
            renderCards(window.allData.filter(r => r[1].toLowerCase().includes(q) && (n === "All" || r[0] === n)));
        }

        // Mulinma Vault eka load wenna
        initNetworks();
        showPage('list');
    </script>
</body>
</html>
